<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invitation</title>

  <style>
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      cursor: pointer;
    }

    .envelope {
      position: relative;
      width: 200px;
      height: 130px;
      background: #e0c3a3;
      overflow: hidden;
    }

    .flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #d2a679;
      transform-origin: top;
      transition: 0.8s;
    }

    .letter {
      position: absolute;
      width: 90%;
      height: 90%;
      background: white;
      top: 5%;
      left: 5%;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translateY(100%);
      transition: 0.8s;
      font-family: sans-serif;
    }

    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="container" onclick="openEnvelope()">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p>maybe you remember this place...</p>
    </div>
  </div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function openEnvelope() {
  const env = document.getElementById("envelope");
  const music = document.getElementById("music");

  env.classList.add("open");
  music.play();
}
</script>

</body>
</html>
